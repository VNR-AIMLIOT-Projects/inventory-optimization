version: 2
updates:
  # Maintain dependencies for Python backend
  - package-ecosystem: "pip"
    directory: "/Backend-RL"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5

  # Maintain dependencies for Node frontend
  - package-ecosystem: "npm"
    directory: "/Frontend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5

  # Maintain GitHub Actions dependencies
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
