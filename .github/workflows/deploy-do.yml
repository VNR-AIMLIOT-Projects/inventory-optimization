name: Deploy to DigitalOcean

on:
  push:
    branches:
      - prod

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up SSH Setup
        env:
          DO_SSH_KEY: ${{ secrets.DO_SSH_KEY }}
          DO_HOST: ${{ secrets.DO_HOST }}
        run: |
          mkdir -p ~/.ssh/
          echo "$DO_SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H $DO_HOST >> ~/.ssh/known_hosts

      - name: Prepare production environment file
        env:
          PROD_ENV_FILE: ${{ secrets.PROD_ENV_FILE }}
        run: |
          echo "$PROD_ENV_FILE" > .env.prod

      - name: Sync repository to DigitalOcean Droplet
        env:
          DO_HOST: ${{ secrets.DO_HOST }}
          DO_USERNAME: ${{ secrets.DO_USERNAME }}
        run: |
          # Use rsync to copy the latest code to the server, excluding git and node_modules
          rsync -avz --exclude='.git' --exclude='Frontend/node_modules' --exclude='Backend-RL/venv' -e "ssh -i ~/.ssh/id_rsa" ./ $DO_USERNAME@$DO_HOST:~/inventory-optimization/

      - name: Deploy via Docker Compose
        env:
          DO_HOST: ${{ secrets.DO_HOST }}
          DO_USERNAME: ${{ secrets.DO_USERNAME }}
        run: |
          ssh -o ServerAliveInterval=60 -o ServerAliveCountMax=120 -i ~/.ssh/id_rsa $DO_USERNAME@$DO_HOST << 'EOF'
            cd ~/inventory-optimization
            # Ensure Docker is ready
            sudo systemctl start docker || true

            # ── ONE-TIME FIX: wipe the old volume so Postgres re-creates the db
            # with the credentials from the current .env.prod. Remove after first
            # successful deploy.
            sudo docker compose --env-file .env.prod -f docker-compose.yml -f docker-compose.prod.yml down -v --remove-orphans || true

            # Rebuild and restart the containers
            sudo docker compose --env-file .env.prod -f docker-compose.yml -f docker-compose.prod.yml up -d --build

            # Prune old images to save disk space
            sudo docker image prune -f
          EOF

      - name: Verification Check
        env:
          DO_HOST: ${{ secrets.DO_HOST }}
        run: |
          echo "Waiting 30 seconds for containers to initialize..."
          sleep 30
          # Simple check to guarantee API is responsive
          curl -sf http://$DO_HOST:8000/docs || echo "Backend Docs returned a non-200 status, deployment might need inspection."
          curl -sf http://$DO_HOST:3000 || echo "Frontend returned a non-200 status, deployment might need inspection."
