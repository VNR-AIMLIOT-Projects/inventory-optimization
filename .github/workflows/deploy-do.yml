name: Deploy to DigitalOcean

on:
  push:
    branches:
      - prod

jobs:
  backend-tests:
    name: Backend Unit & Integration Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Backend Dependencies
        run: |
          cd Backend-RL
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          pip install pytest httpx

      - name: Load Environment Variables
        run: |
          echo "${{ secrets.PROD_ENV_FILE }}" > .env
          while IFS= read -r line || [ -n "$line" ]; do
            if [[ -n "$line" && "$line" != \#* ]]; then
              echo "$line" >> $GITHUB_ENV
            fi
          done < .env

      - name: Setup Test Database
        run: |
          cd Backend-RL
          mkdir -p storage
          PYTHONPATH=src alembic upgrade head

      - name: Run Pytest (Unit & Integration)
        run: |
          cd Backend-RL
          PYTHONPATH=src python -m pytest tests/test_api.py tests/test_copilot.py -v

      - name: Run Performance Tests
        run: |
          cd Backend-RL
          PYTHONPATH=src python -m pytest tests/test_perf.py -v

  e2e-tests:
    name: End-to-End Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Playwright & Pytest
        run: |
          pip install pytest playwright
          playwright install chromium --with-deps

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          
      - name: Install Frontend Dependencies
        run: |
          cd Frontend
          npm ci

      - name: Load Environment Variables
        run: |
          echo "${{ secrets.PROD_ENV_FILE }}" > .env
          while IFS= read -r line || [ -n "$line" ]; do
            if [[ -n "$line" && "$line" != \#* ]]; then
              echo "$line" >> $GITHUB_ENV
            fi
          done < .env

      - name: Start Services & Run E2E
        run: |
          # Use docker-compose for the backend services and DB
          docker compose up -d
          
          # Wait for services to be ready
          sleep 15
          
          # Run the E2E script
          python -m pytest e2e_tests/test_e2e_flow.py -v

  build-frontend:
    needs: [backend-tests, e2e-tests]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./Frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/replenix-frontend:latest
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/replenix-frontend:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/replenix-frontend:buildcache,mode=max

  build-backend:
    needs: [backend-tests, e2e-tests]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./Backend-RL
          file: ./Backend-RL/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/replenix-backend:latest
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/replenix-backend:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/replenix-backend:buildcache,mode=max

  build-worker:
    needs: [backend-tests, e2e-tests]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push RL Worker
        uses: docker/build-push-action@v5
        with:
          context: ./Backend-RL
          file: ./Backend-RL/Dockerfile.worker
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/replenix-rl-worker:latest
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/replenix-rl-worker:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/replenix-rl-worker:buildcache,mode=max

  deploy-digitalocean:
    needs: [build-frontend, build-backend, build-worker]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up SSH
        env:
          DO_SSH_KEY: ${{ secrets.DO_SSH_KEY }}
          DO_HOST: ${{ secrets.DO_HOST }}
        run: |
          mkdir -p ~/.ssh/
          echo "$DO_SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H $DO_HOST >> ~/.ssh/known_hosts

      - name: Prepare production environment file
        env:
          PROD_ENV_FILE: ${{ secrets.PROD_ENV_FILE }}
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
        run: |
          echo "$PROD_ENV_FILE" > .env.prod
          echo "DOCKER_USERNAME=$DOCKER_USERNAME" >> .env.prod

      - name: Sync repository to DigitalOcean Droplet
        env:
          DO_HOST: ${{ secrets.DO_HOST }}
          DO_USERNAME: ${{ secrets.DO_USERNAME }}
        run: |
          rsync -avz \
            --exclude='.git' \
            --exclude='Frontend/node_modules' \
            --exclude='Backend-RL/venv' \
            -e "ssh -i ~/.ssh/id_rsa" \
            ./ $DO_USERNAME@$DO_HOST:~/inventory-optimization/

      - name: Deploy via Docker Compose
        env:
          DO_HOST: ${{ secrets.DO_HOST }}
          DO_USERNAME: ${{ secrets.DO_USERNAME }}
        run: |
          ssh -o ServerAliveInterval=60 -o ServerAliveCountMax=120 -i ~/.ssh/id_rsa $DO_USERNAME@$DO_HOST << 'EOF'
            set -e
            cd ~/inventory-optimization

            # Ensure Docker is running
            sudo systemctl start docker || true

            # Load the password from .env.prod so we can heal Postgres if needed
            PG_PASS=$(grep '^POSTGRES_PASSWORD=' .env.prod | cut -d'=' -f2-)
            
            # --- Heal Postgres password to match .env.prod (safe to run every time) ---
            PG_CONTAINER=$(sudo docker compose -f docker-compose.yml -f docker-compose.prod.yml ps -q postgres)
            if [ -n "$PG_CONTAINER" ]; then
              echo "Postgres is running. Force-syncing password with .env.prod..."
              sudo docker exec -u postgres $PG_CONTAINER psql -c "ALTER USER postgres WITH PASSWORD '$PG_PASS';"
            fi

            # Create a 'resolved' env file for Docker Compose (escapes $ as $$)
            cp .env.prod .env.deploy
            sed -i 's/\$/\$\$/g' .env.deploy

            # Deploy with the resolved environment
            sudo docker compose --env-file .env.deploy \
              -f docker-compose.yml -f docker-compose.prod.yml \
              down --remove-orphans || true
              
            # Pull pre-compiled images from Docker Hub
            sudo docker compose --env-file .env.deploy \
              -f docker-compose.yml -f docker-compose.prod.yml \
              pull
              
            # Start the application using pulled images (no build)
            sudo docker compose --env-file .env.deploy \
              -f docker-compose.yml -f docker-compose.prod.yml \
              up -d
            
            # Keep .env so when instances restart or health checks run, they know the expected secrets
            cp .env.deploy .env
            sudo docker image prune -f
            
            echo "Waiting 30 seconds for containers to initialize..."
            sleep 30
            
            echo "--- Backend Health Check ---"
            curl -sv http://localhost:8000/api/health || echo "Health check failed (HTTP error)"
          EOF

      - name: Verification Check
        env:
          DO_HOST: ${{ secrets.DO_HOST }}
        run: |
          echo "Waiting 30 seconds for containers to initialize..."
          sleep 30
          curl -sf http://$DO_HOST:8000/docs || echo "⚠️  Backend check failed — inspect the server."
          curl -sf http://$DO_HOST:3000 || echo "⚠️  Frontend check failed — inspect the server."
