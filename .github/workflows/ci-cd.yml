name: Main CI/CD Pipeline

on:
  push:
    branches: [dev, preprod, prod]
  pull_request:
    branches: [dev, preprod, prod]

jobs:
  backend-tests:
    name: Backend Unit & Integration Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      checks: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: |
          cd Backend-RL
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          pip install pytest httpx
      - run: |
          echo "${{ secrets.PROD_ENV_FILE }}" > .env
          while IFS= read -r line || [ -n "$line" ]; do
            if [[ -n "$line" && "$line" != \#* ]]; then echo "$line" >> $GITHUB_ENV; fi
          done < .env
          echo "DATABASE_URL=sqlite:///./storage/inventory.db" >> $GITHUB_ENV
          echo "RABBITMQ_URL=amqp://guest:guest@localhost:5672/" >> $GITHUB_ENV
          echo "MAX_PARALLEL_SKUS=2" >> $GITHUB_ENV
      - run: |
          cd Backend-RL
          mkdir -p storage
          PYTHONPATH=src alembic upgrade head
      - run: |
          cd Backend-RL
          PYTHONPATH=src python -m pytest tests/ -v
      - run: |
          cd Backend-RL
          PYTHONPATH=src python -m pytest tests/test_perf.py -v

  e2e-tests:
    name: End-to-End Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      checks: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: |
          pip install pytest playwright
          playwright install chromium --with-deps
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: |
          cd Frontend
          npm ci
      - run: |
          echo "${{ secrets.PROD_ENV_FILE }}" > .env
          while IFS= read -r line || [ -n "$line" ]; do
            if [[ -n "$line" && "$line" != \#* ]]; then echo "$line" >> $GITHUB_ENV; fi
          done < .env
      - run: |
          docker compose -f setup/docker-compose.yml up -d
          sleep 15
          python -m pytest e2e_tests/test_e2e_flow.py -v

  build-backend:
    name: "Build Backend Image"
    needs: [backend-tests, e2e-tests]
    if: github.event_name == 'push' && (github.ref_name == 'preprod' || github.ref_name == 'prod')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - uses: docker/build-push-action@v5
        with:
          context: ./Backend-RL
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/replenix-backend:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/replenix-backend:${{ github.ref_name }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/replenix-backend:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/replenix-backend:buildcache,mode=max

  build-worker:
    name: "Build RL Worker Image"
    needs: [backend-tests, e2e-tests]
    if: github.event_name == 'push' && (github.ref_name == 'preprod' || github.ref_name == 'prod')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - uses: docker/build-push-action@v5
        with:
          context: ./Backend-RL
          file: ./Backend-RL/Dockerfile.worker
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/replenix-rl-worker:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/replenix-rl-worker:${{ github.ref_name }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/replenix-rl-worker:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/replenix-rl-worker:buildcache,mode=max

  build-frontend:
    name: "Build Frontend Image"
    needs: [backend-tests, e2e-tests]
    if: github.event_name == 'push' && (github.ref_name == 'preprod' || github.ref_name == 'prod')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - uses: docker/build-push-action@v5
        with:
          context: ./Frontend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/replenix-frontend:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/replenix-frontend:${{ github.ref_name }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/replenix-frontend:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/replenix-frontend:buildcache,mode=max

  deploy:
    name: "Deploy to ${{ github.ref_name == 'prod' && 'Production' || 'Pre-Production' }}"
    needs: [build-backend, build-worker, build-frontend]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref_name == 'preprod' || github.ref_name == 'prod')
    environment:
      name: ${{ github.ref_name == 'prod' && 'prod' || 'preprod' }}
      url: ${{ github.ref_name == 'prod' && 'https://replenix.app' || 'https://preprod.replenix.app' }}
    permissions:
      contents: read
    env:
      K8S_NAMESPACE: ${{ github.ref_name == 'prod' && 'replenix-prod' || 'replenix-preprod' }}
    steps:
      - uses: actions/checkout@v4
      - uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_API_TOKEN }}
      - run: doctl kubernetes cluster kubeconfig save 55700c4e-5094-42a1-9805-589790608127
      - env:
          PROD_ENV_FILE: ${{ secrets.PROD_ENV_FILE }}
        run: |
          echo "$PROD_ENV_FILE" | tr -d '\r' > .env
          DB_USER=$(grep '^POSTGRES_USER=' .env | cut -d '=' -f2-)
          DB_PASS=$(grep '^POSTGRES_PASSWORD=' .env | cut -d '=' -f2-)
          DB_NAME=$(grep '^POSTGRES_DB=' .env | cut -d '=' -f2-)
          RMQ_USER=$(grep '^RABBITMQ_DEFAULT_USER=' .env | cut -d '=' -f2-)
          RMQ_PASS=$(grep '^RABBITMQ_DEFAULT_PASS=' .env | cut -d '=' -f2-)
          GROQ_KEY=$(grep '^GROQ_API_KEY=' .env | cut -d '=' -f2-)
          RESEND_KEY=$(grep '^RESEND_API_KEY=' .env | cut -d '=' -f2-)
          RESEND_FROM=$(grep '^RESEND_FROM=' .env | cut -d '=' -f2-)
          SESS_SEC=$(grep '^SESSION_SECRET=' .env | cut -d '=' -f2-)
          if [ -z "$SESS_SEC" ]; then SESS_SEC=$(openssl rand -base64 32); fi
          DATABASE_URL="postgresql://${DB_USER}:${DB_PASS}@postgres:5432/${DB_NAME}"
          RABBITMQ_URL="amqp://${RMQ_USER}:${RMQ_PASS}@rabbitmq.${{ env.K8S_NAMESPACE }}.svc.cluster.local:5672/"
          kubectl create secret generic postgres-secret --namespace=${{ env.K8S_NAMESPACE }} --from-literal=POSTGRES_USER="${DB_USER}" --from-literal=POSTGRES_PASSWORD="${DB_PASS}" --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic replenix-secrets --namespace=${{ env.K8S_NAMESPACE }} --from-literal=DATABASE_URL="${DATABASE_URL}" --from-literal=RABBITMQ_URL="${RABBITMQ_URL}" --from-literal=RABBITMQ_DEFAULT_USER="${RMQ_USER}" --from-literal=RABBITMQ_DEFAULT_PASS="${RMQ_PASS}" --from-literal=GROQ_API_KEY="${GROQ_KEY}" --from-literal=RESEND_API_KEY="${RESEND_KEY}" --from-literal=RESEND_FROM="${RESEND_FROM}" --from-literal=SESSION_SECRET="${SESS_SEC}" --dry-run=client -o yaml | kubectl apply -f -
      - run: |
          NS=${{ env.K8S_NAMESPACE }}
          TAG=${{ github.sha }}
          DU=${{ secrets.DOCKER_USERNAME }}
          sed -i "s|DOCKER_USERNAME/replenix-backend:IMAGE_TAG|${DU}/replenix-backend:${TAG}|g" k8s/backend/deployment.yaml
          sed -i "s|DOCKER_USERNAME/replenix-frontend:IMAGE_TAG|${DU}/replenix-frontend:${TAG}|g" k8s/frontend/deployment.yaml
          sed -i "s|DOCKER_USERNAME/replenix-rl-worker:IMAGE_TAG|${DU}/replenix-rl-worker:${TAG}|g" k8s/rl-worker/deployment.yaml
          
          # Pause KEDA autoscaling and force release the ReadWriteOnce PVC
          kubectl annotate scaledobject rl-worker-scaler -n ${NS} autoscaling.keda.sh/paused-replicas="0" --overwrite || true
          kubectl delete pods -l app=replenix-rl-worker -n ${NS} --force --grace-period=0 || true

          kubectl apply -f k8s/namespace/namespace.yaml
          kubectl apply -f k8s/network-policy/network-policy.yaml -n ${NS}
          kubectl apply -f k8s/postgres/statefulset.yaml -n ${NS}
          kubectl apply -f k8s/rabbitmq/statefulset.yaml -n ${NS}
          kubectl apply -f k8s/backend/deployment.yaml -n ${NS}
          kubectl apply -f k8s/frontend/deployment.yaml -n ${NS}
          kubectl apply -f k8s/ingress/ingress.yaml
      - run: |
          NS=${{ env.K8S_NAMESPACE }}
          
          # Wait for backend with increased timeout (10 minutes)
          echo "⏳ Waiting for backend deployment..."
          kubectl rollout status deployment/backend -n ${NS} --timeout=10m || {
            echo "❌ Backend rollout failed. Checking pod status..."
            kubectl get pods -n ${NS} -l app=replenix-backend -o wide
            kubectl describe pods -n ${NS} -l app=replenix-backend
            kubectl logs -n ${NS} -l app=replenix-backend --tail=50
            exit 1
          }
          
          # Now apply rl-worker which will bind to the NEW backend node
          kubectl apply -f k8s/rl-worker/deployment.yaml -n ${NS}
          
          # Unpause KEDA so rl-worker can scale
          kubectl annotate scaledobject rl-worker-scaler -n ${NS} autoscaling.keda.sh/paused-replicas- --overwrite || true
          
          echo "⏳ Waiting for frontend deployment..."
          kubectl rollout status deployment/frontend -n ${NS} --timeout=10m
          
          echo "⏳ Waiting for rl-worker deployment..."
          kubectl rollout status deployment/rl-worker -n ${NS} --timeout=10m
      - run: |
          if [ "${{ github.ref_name }}" == "prod" ]; then
            FRONTEND_URL="https://replenix.app"
            API_URL="https://api.replenix.app/api/health"
            API_HOST="api.replenix.app"
            FRONTEND_HOST="replenix.app"
          else
            FRONTEND_URL="https://preprod.replenix.app"
            API_URL="https://api-preprod.replenix.app/api/health"
            API_HOST="api-preprod.replenix.app"
            FRONTEND_HOST="preprod.replenix.app"
          fi
          INGRESS_IP=$(kubectl get ingress replenix-ingress -n ${{ env.K8S_NAMESPACE }} -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
          echo "Testing $API_URL on IP $INGRESS_IP..."
          sleep 15
          curl -sfk --resolve ${API_HOST}:443:${INGRESS_IP} ${API_URL} || (echo "⚠️ API health check failed" && exit 1)
          curl -sfk --resolve ${FRONTEND_HOST}:443:${INGRESS_IP} ${FRONTEND_URL} || (echo "⚠️ Frontend check failed" && exit 1)
          echo "✅ Smoke tests passed for ${{ env.K8S_NAMESPACE }}"
      - if: failure()
        run: |
          echo "❌ Deployment failed — rolling back..."
          kubectl rollout undo deployment/backend -n ${{ env.K8S_NAMESPACE }} || true
          kubectl rollout undo deployment/frontend -n ${{ env.K8S_NAMESPACE }} || true
          kubectl rollout undo deployment/rl-worker -n ${{ env.K8S_NAMESPACE }} || true
          echo "✅ Rollback complete"
