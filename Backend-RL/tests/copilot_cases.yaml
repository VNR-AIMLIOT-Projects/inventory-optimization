# ─────────────────────────────────────────────────────────────────────────────
# PAGE 1: DEMAND DATA (stage1)
# ─────────────────────────────────────────────────────────────────────────────
- name: "Stage 1 - Valid Generate Demand"
  page: "stage1"
  context: {"skus": []}
  message: "Generate 180 days of winter data starting 2025-03-01 with seed 42"
  expected_action: "generate_demand"
  expected_params:
    season_type: "winter"
    num_days: 180
    start_date: "2025-03-01"
    seed: 42

- name: "Stage 1 - Edge Case (No Seed Given)"
  page: "stage1"
  context: {"skus": []}
  message: "Give me exactly 180 days of summer data starting 2025-01-01"
  expected_action: "generate_demand"
  expected_params:
    season_type: "summer"
    num_days: 180
    start_date: "2025-01-01"

- name: "Stage 1 - Select SKU Valid"
  page: "stage1"
  context: {"skus": ["summer-pack", "winter-pack"], "has_file": true}
  message: "Switch to the winter pack"
  expected_action: "select_sku"
  expected_params:
    sku: "winter-pack"

- name: "Stage 1 - Hallucination Refusal (Out of Scope Tool)"
  page: "stage1"
  context: {"has_data": true}
  message: "Start training the model with a holding cost of 5"
  expected_action: "unknown"
  must_contain_text: "training"

# ─────────────────────────────────────────────────────────────────────────────
# PAGE 2: MODIFY DEMAND (modify)
# ─────────────────────────────────────────────────────────────────────────────
- name: "Modify - Valid Scale Extracted"
  page: "modify"
  context: {"sku": "synthetic-summer"}
  message: "Scale the demand up by 50% from 2025-06-01 to 2025-06-14"
  expected_action: "scale"
  expected_params:
    factor: 1.5
    start_date: "2025-06-01"
    end_date: "2025-06-14"

- name: "Modify - Valid Spike Extracted"
  page: "modify"
  context: {"sku": "SKU_A"}
  message: "Create a massive spike of 200 units on 2025-06-01"
  expected_action: "spike"
  expected_params:
    amount: 200
    date: "2025-06-01"

- name: "Modify - Navigation/General Chat Fallback"
  page: "modify"
  context: {}
  message: "Looks good, what is a spike?"
  expected_action: "unknown"

- name: "Modify - Hallucination Refusal (Out of Scope Tool)"
  page: "modify"
  context: {}
  message: "Run a deployment simulation for today"
  expected_action: "unknown"

# ─────────────────────────────────────────────────────────────────────────────
# PAGE 3: TRAINING (train)
# ─────────────────────────────────────────────────────────────────────────────
- name: "Train - Start Training Standard"
  page: "train"
  context: {"skus": ["SKU_1"]}
  message: "Train the model for 500 episodes using the defaults"
  expected_action: "start_training"
  expected_params:
    episodes: 500

- name: "Train - Custom Hyperparameters"
  page: "train"
  context: {"skus": ["SKU_1"]}
  message: "Run 200 episodes. Change stockout penalty to 500 and holding cost to 5"
  expected_action: "start_training"
  expected_params:
    episodes: 200
    stockout_penalty: 500.0
    holding_cost: 5.0

- name: "Train - Hallucination Refusal (Data Gen)"
  page: "train"
  context: {}
  message: "Generate some synthetic demand data for me first"
  expected_action: "unknown"

# ─────────────────────────────────────────────────────────────────────────────
# PAGE 4 & 5: EVALUATE / DEPLOY
# ─────────────────────────────────────────────────────────────────────────────
- name: "Deploy - Run Simulation"
  page: "deploy"
  context: {"skus": ["SKU_1"]}
  message: "Start the deployment simulation for SKU_1"
  expected_action: "start_deployment"

- name: "Deploy - Step Next Day"
  page: "deploy"
  context: {"session_active": true, "current_day": 5, "total_days": 90}
  message: "Move to the next day"
  expected_action: "step_day"
  expected_params:
    num_days: 1

- name: "Deploy - Apply Manual Override"
  page: "deploy"
  context: {"session_active": true, "current_day": 12}
  message: "Manually order 50 units for the current day"
  expected_action: "apply_override"
  expected_params:
    override_qty: 50
    day: 12

- name: "Deploy - Hallucination Refusal (Training)"
  page: "deploy"
  context: {}
  message: "Retrain the model right now"
  expected_action: "unknown"
