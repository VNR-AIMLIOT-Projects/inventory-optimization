# =====================================================================
# Replenix RabbitMQ — StatefulSet
#
# Why StatefulSet (not Deployment)?
# → StatefulSets give RabbitMQ a stable hostname (rabbitmq-0)
# → PVC is preserved if the pod restarts (no queue loss)
# → Consistent pod identity needed for RabbitMQ clustering
# =====================================================================

apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: rabbitmq
  labels:
    app: replenix-rabbitmq
spec:
  serviceName: rabbitmq   # Headless service name
  replicas: 1             # Single node (sufficient for student project)
  selector:
    matchLabels:
      app: replenix-rabbitmq
  template:
    metadata:
      labels:
        app: replenix-rabbitmq
    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:3.13-management-alpine
          ports:
            - containerPort: 5672    # AMQP
              name: amqp
            - containerPort: 15672   # Management UI (internal only)
              name: management
          env:
            - name: RABBITMQ_DEFAULT_USER
              valueFrom:
                secretKeyRef:
                  name: replenix-secrets
                  key: RABBITMQ_DEFAULT_USER
            - name: RABBITMQ_DEFAULT_PASS
              valueFrom:
                secretKeyRef:
                  name: replenix-secrets
                  key: RABBITMQ_DEFAULT_PASS

          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          livenessProbe:
            exec:
              command: ["rabbitmq-diagnostics", "-q", "ping"]
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3

          readinessProbe:
            exec:
              command: ["rabbitmq-diagnostics", "-q", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 10

          volumeMounts:
            - name: rabbitmq-data
              mountPath: /var/lib/rabbitmq

  # StatefulSet PVC template — auto-creates a PVC per pod
  volumeClaimTemplates:
    - metadata:
        name: rabbitmq-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
        storageClassName: do-block-storage

---
# --- Headless Service (for pod DNS — rabbitmq-0.rabbitmq) ---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  labels:
    app: replenix-rabbitmq
spec:
  clusterIP: None   # Headless — direct pod addressing
  selector:
    app: replenix-rabbitmq
  ports:
    - port: 5672
      name: amqp
      targetPort: 5672
    - port: 15672
      name: management
      targetPort: 15672
