# =====================================================================
# Thanos Object Store Secret — DO Spaces (BLR1)
#
# DO NOT COMMIT with real credentials.
# This file is a template. The install.sh script creates the real
# secret via kubectl using values you type interactively.
#
# Manual creation:
#   kubectl create secret generic thanos-objstore-secret \
#     --namespace monitoring \
#     --from-literal=thanos.yaml="$(cat thanos-objstore.yaml)" \
#     --dry-run=client -o yaml | kubectl apply -f -
# =====================================================================
apiVersion: v1
kind: Secret
metadata:
  name: thanos-objstore-secret
  namespace: monitoring
  annotations:
    # Pre-install hook — must exist before Prometheus/Thanos pods start
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation
type: Opaque
stringData:
  thanos.yaml: |
    type: S3
    config:
      bucket: replenix-metrics-prod
      region: blr1
      endpoint: blr1.digitaloceanspaces.com
      access_key: REPLACE_WITH_DO_SPACES_ACCESS_KEY
      secret_key: REPLACE_WITH_DO_SPACES_SECRET_KEY
      insecure: false
      signature_version2: false
      http_config:
        idle_conn_timeout: 90s
        response_header_timeout: 2m
      trace:
        enable: false
