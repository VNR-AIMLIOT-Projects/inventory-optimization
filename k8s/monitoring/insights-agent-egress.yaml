apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: insights-agent-egress
spec:
  podSelector:
    matchLabels:
      app: insights-agent
  policyTypes:
  - Egress
  egress:
  # Allow DNS resolution
  - ports:
    - port: 53
      protocol: UDP
    - port: 53
      protocol: TCP
    to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
  # Allow egress to Prometheus in monitoring namespace
  - ports:
    - port: 9090
      protocol: TCP
    to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: monitoring
  # Allow HTTPS to external APIs (Groq and Resend)
  - ports:
    - port: 443
      protocol: TCP
    to:
    - ipBlock:
        cidr: 0.0.0.0/0
