# =====================================================================
# Replenix Nginx Ingress — TLS + Routing
#
# Routes:
#   replenix.app           → frontend:3000
#   api.replenix.app       → backend:8000
#   preprod.replenix.app   → frontend:3000 (preprod namespace)
#
# TLS: cert-manager auto-provisions Let's Encrypt certificates
#
# Install cert-manager first:
#   helm repo add jetstack https://charts.jetstack.io
#   helm install cert-manager jetstack/cert-manager \
#     --namespace cert-manager --create-namespace \
#     --set installCRDs=true
# =====================================================================

# --- ClusterIssuer: Let's Encrypt production ---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: sujaynimmagadda@gmail.com   # Change to your email
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      - http01:
          ingress:
            class: nginx

---
# --- ClusterIssuer: Let's Encrypt staging (for testing) ---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: sujaynimmagadda@gmail.com
    privateKeySecretRef:
      name: letsencrypt-staging-key
    solvers:
      - http01:
          ingress:
            class: nginx

---
# =====================================================================
# Production Ingress
# =====================================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: replenix-ingress
  namespace: replenix-prod
  annotations:
    # TLS auto-cert from Let's Encrypt
    cert-manager.io/cluster-issuer: "letsencrypt-prod"

    # Rate limiting
    nginx.ingress.kubernetes.io/limit-rps: "30"            # 30 req/sec per IP
    nginx.ingress.kubernetes.io/limit-connections: "10"    # 10 concurrent per IP

    # File upload size (for demand CSV uploads)
    nginx.ingress.kubernetes.io/proxy-body-size: "15m"

    # WebSocket support (for training progress)
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"

    # Force HTTPS redirect
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"

spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - replenix.app
        - www.replenix.app
      secretName: replenix-tls-cert
    - hosts:
        - api.replenix.app
      secretName: replenix-api-tls-cert

  rules:
    # Main frontend
    - host: replenix.app
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 3000

    # www redirect handled by Cloudflare (Page Rule: redirect www → apex)

    # Backend API
    - host: api.replenix.app
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8000
          - path: /docs
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8000
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8000

---
# =====================================================================
# Pre-Production Ingress (same cluster, different namespace)
# URL: preprod.replenix.app and api-preprod.replenix.app
# =====================================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: replenix-ingress
  namespace: replenix-preprod
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"  # Use production cert for preprod now that DNS is working
    nginx.ingress.kubernetes.io/limit-rps: "20"
    nginx.ingress.kubernetes.io/proxy-body-size: "15m"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - preprod.replenix.app
        - api-preprod.replenix.app
      secretName: replenix-preprod-tls-cert
  rules:
    - host: preprod.replenix.app
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 3000
    - host: api-preprod.replenix.app
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8000
