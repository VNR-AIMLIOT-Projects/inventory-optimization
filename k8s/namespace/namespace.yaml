# =====================================================================
# Replenix Kubernetes Namespaces
# We use namespaces to separate environments within the SAME cluster
# This means NO extra cost — just logical separation on the same DOKS nodes
#
# Environments:
#   replenix-preprod  → test before prod (same cluster, free)
#   replenix-prod     → production traffic
# =====================================================================

# --- Pre-Production Namespace ---
apiVersion: v1
kind: Namespace
metadata:
  name: replenix-preprod
  labels:
    app.kubernetes.io/name: replenix
    environment: preprod

---
# Resource limits for preprod (smaller, cheaper)
apiVersion: v1
kind: ResourceQuota
metadata:
  name: preprod-quota
  namespace: replenix-preprod
spec:
  hard:
    requests.cpu: "4"
    requests.memory: 6Gi
    limits.cpu: "8"
    limits.memory: 12Gi
    pods: "20"

---
# --- Production Namespace ---
apiVersion: v1
kind: Namespace
metadata:
  name: replenix-prod
  labels:
    app.kubernetes.io/name: replenix
    environment: prod

---
# Resource limits for prod (full cluster resources)
apiVersion: v1
kind: ResourceQuota
metadata:
  name: prod-quota
  namespace: replenix-prod
spec:
  hard:
    requests.cpu: "8"
    requests.memory: 12Gi
    limits.cpu: "16"
    limits.memory: 24Gi
    pods: "40"
