# =====================================================================
# Replenix Kubernetes NetworkPolicy
#
# What this does: Creates a firewall INSIDE the cluster.
# Even if one pod is compromised, it can't talk to pods it shouldn't.
#
# Rules:
#   frontend      → can only call backend
#   backend       → can call rabbitmq + postgres (external)
#   rl-worker     → can only call rabbitmq + postgres (external)
#   rabbitmq      → only backend + rl-worker can connect to it
#   NO direct access to rabbitmq management UI from outside
# =====================================================================

# --- Default deny all ingress + egress in replenix-prod ---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: replenix-prod
spec:
  podSelector: {}    # Applies to ALL pods in namespace
  policyTypes:
    - Ingress
    - Egress

---
# --- Allow ingress controller to reach frontend ---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-frontend
  namespace: replenix-prod
spec:
  podSelector:
    matchLabels:
      app: replenix-frontend
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 3000

---
# --- Allow ingress controller to reach backend ---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-backend
  namespace: replenix-prod
spec:
  podSelector:
    matchLabels:
      app: replenix-backend
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
        - podSelector:
            matchLabels:
              app: replenix-frontend   # Frontend can also call backend internally
      ports:
        - protocol: TCP
          port: 8000

---
# --- Allow backend egress to RabbitMQ and PostgreSQL ---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: backend-egress
  namespace: replenix-prod
spec:
  podSelector:
    matchLabels:
      app: replenix-backend
  policyTypes:
    - Egress
  egress:
    # To RabbitMQ in same namespace
    - to:
        - podSelector:
            matchLabels:
              app: replenix-rabbitmq
      ports:
        - protocol: TCP
          port: 5672
    # To PostgreSQL (external — DO Managed DB)
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0   # DO Managed DB is external
      ports:
        - protocol: TCP
          port: 5432
    # DNS resolution
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
    # HTTPS for external APIs (Groq, Resend)
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443

---
# --- Allow RL workers to reach RabbitMQ and PostgreSQL ---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: rl-worker-egress
  namespace: replenix-prod
spec:
  podSelector:
    matchLabels:
      app: replenix-rl-worker
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: replenix-rabbitmq
      ports:
        - protocol: TCP
          port: 5672
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 5432
    # DNS
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53

---
# --- RabbitMQ: only allow connections from backend + workers ---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: rabbitmq-ingress
  namespace: replenix-prod
spec:
  podSelector:
    matchLabels:
      app: replenix-rabbitmq
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: replenix-backend
        - podSelector:
            matchLabels:
              app: replenix-rl-worker
      ports:
        - protocol: TCP
          port: 5672   # AMQP only — management UI (15672) not exposed
