# =====================================================================
# Replenix Secrets Template
#
# IMPORTANT: This file is a TEMPLATE only — it shows the structure.
# Real secrets are NEVER stored in git. They are created by the CI/CD
# pipeline using values from GitHub Secrets.
#
# How it works:
#   GitHub Secrets → CI/CD creates these via kubectl
#   The CI/CD script runs: kubectl apply -f k8s/secrets/ (after substitution)
# =====================================================================

# --- Application Secrets (injected by CI from GitHub Secrets) ---
apiVersion: v1
kind: Secret
metadata:
  name: replenix-secrets
  labels:
    app.kubernetes.io/name: replenix
type: Opaque
stringData:
  # Database — use DigitalOcean Managed PostgreSQL connection string
  DATABASE_URL: "REPLACE_BY_CI"                  # postgresql://user:pass@host:port/dbname

  # Message Queue
  RABBITMQ_URL: "REPLACE_BY_CI"                  # amqp://user:pass@rabbitmq:5672/
  RABBITMQ_DEFAULT_USER: "REPLACE_BY_CI"
  RABBITMQ_DEFAULT_PASS: "REPLACE_BY_CI"

  # External API keys
  GROQ_API_KEY: "REPLACE_BY_CI"
  RESEND_API_KEY: "REPLACE_BY_CI"
  RESEND_FROM: "Replenix System <noreply@replenix.app>"

  # Frontend session
  SESSION_SECRET: "REPLACE_BY_CI"               # Generated: openssl rand -base64 32

  # DigitalOcean Spaces (S3-compatible model/upload storage)
  SPACES_KEY: "REPLACE_BY_CI"
  SPACES_SECRET: "REPLACE_BY_CI"
  SPACES_ENDPOINT: "https://nyc3.digitaloceanspaces.com"
  SPACES_BUCKET: "replenix-storage"

---
# --- Postgres password for internal RabbitMQ pod (if not using Managed DB) ---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secrets
type: Opaque
stringData:
  POSTGRES_USER: "REPLACE_BY_CI"
  POSTGRES_PASSWORD: "REPLACE_BY_CI"
  POSTGRES_DB: "inventory"
